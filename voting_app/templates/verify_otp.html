<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP — VoteSecure</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#06070d;
    --card:#111320;
    --accent:#4f6ef7;
    --violet:#9b7ff7;
    --text:#eef0f8;
    --sub:#8890aa;
    --border:rgba(255,255,255,0.08);
}

/* reset */
*{margin:0;padding:0;box-sizing:border-box}

/* layout */
body{
    min-height:100dvh;
    font-family:'Outfit',sans-serif;
    background: radial-gradient(circle at top,#0d1020,#06070d);
    color:var(--text);

    display:grid;
    place-items:center;

    padding:20px 12px;
}

/* mobile top align */
@media(max-width:480px){
    body{
        place-items:start;
    }
}

/* card */
.card{
    width:100%;
    max-width:420px;

    background:rgba(17,19,32,0.9);
    backdrop-filter: blur(12px);

    border:1px solid var(--border);
    border-radius:20px;

    padding:28px 22px;

    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    animation:fade .5s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1}
}

/* header */
.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
}

.chip{
    font-size:11px;
    padding:4px 10px;
    border-radius:20px;
    background:rgba(79,110,247,.15);
    color:var(--accent);
}

/* title */
h1{
    font-size:24px;
    font-weight:800;
    margin-bottom:6px;
}

.sub{
    font-size:13px;
    color:var(--sub);
    margin-bottom:18px;
}

/* otp */
.otp-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
    margin-bottom:18px;
}

.otp-box{
    aspect-ratio:1;
    text-align:center;
    font-size:20px;
    font-weight:700;

    border-radius:10px;
    border:1.5px solid var(--border);

    background:#0d0f1a;
    color:white;

    outline:none;
    transition:.2s;
}

.otp-box:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 2px rgba(79,110,247,.3);
}

.otp-box.filled{
    border-color:var(--violet);
    color:var(--violet);
}

/* button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;

    background:linear-gradient(135deg,var(--accent),var(--violet));
    color:white;

    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

button:disabled{
    opacity:.4;
    cursor:not-allowed;
}

/* footer */
.footer{
    text-align:center;
    font-size:13px;
    margin-top:14px;
    color:var(--sub);
}

.footer a{
    color:var(--violet);
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<div class="card">

<div class="top">
    <div class="chip">🔐 VoteSecure</div>
    <div class="chip">OTP</div>
</div>

<h1>Verify OTP</h1>
<p class="sub">Enter 6-digit code sent to <b>{{ email }}</b></p>

<form method="POST" id="form">
{% csrf_token %}
<input type="hidden" name="otp" id="finalOtp">

<div class="otp-grid">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
    <input class="otp-box" maxlength="1">
</div>

<button id="btn" disabled>Verify OTP</button>
</form>

<div class="footer">
    Didn't get code? <a href="{% url 'resend_otp' %}">Resend</a>
</div>

</div>

<script>
const boxes=document.querySelectorAll(".otp-box");
const btn=document.getElementById("btn");
const final=document.getElementById("finalOtp");

boxes.forEach((box,i)=>{
    box.addEventListener("input",e=>{
        let val=e.target.value.replace(/\D/g,'');
        box.value=val;

        if(val && i<5) boxes[i+1].focus();

        update();
    });

    box.addEventListener("keydown",e=>{
        if(e.key==="Backspace" && !box.value && i>0){
            boxes[i-1].focus();
        }
    });

    box.addEventListener("paste",e=>{
        e.preventDefault();
        let data=e.clipboardData.getData("text").slice(0,6);
        data.split('').forEach((d,i)=>{
            if(boxes[i]) boxes[i].value=d;
        });
        update();
    });
});

function update(){
    let otp=[...boxes].map(b=>b.value).join('');
    btn.disabled=otp.length<6;
    final.value=otp;
}

boxes[0].focus();
</script>

</body>
</html>
